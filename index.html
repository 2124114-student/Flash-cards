<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フラッシュカード</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', -apple-system, sans-serif; background: #f3f3ee; color: #1a1a1a; min-height: 100vh; font-size: 14px; }
    .wrap { max-width: 540px; margin: 0 auto; padding: 40px 20px 60px; }

    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .header-icon { width: 32px; height: 32px; border-radius: 8px; background: #fff; border: 1px solid #e0dfd8; display: flex; align-items: center; justify-content: center; color: #666; }
    .header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .header .fname { font-size: 11px; color: #999; margin-top: 1px; }

    .card { background: #fff; border: 1px solid #e0dfd8; border-radius: 16px; padding: 24px; margin-bottom: 10px; }

    /* stats row */
    .stats-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .stat-box { flex: 1; background: #fff; border: 1px solid #e0dfd8; border-radius: 12px; padding: 12px 14px; }
    .stat-num { font-size: 22px; font-weight: 600; color: #1a1a1a; line-height: 1; margin-bottom: 3px; }
    .stat-num.red   { color: #e04040; }
    .stat-num.amber { color: #d97706; }
    .stat-num.green { color: #16a34a; }
    .stat-label { font-size: 11px; color: #999; }

    .prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .prog-label { font-size: 12px; color: #999; }
    .prog-count { font-size: 12px; color: #555; font-weight: 500; }
    .prog-bar { height: 3px; background: #eceae3; border-radius: 99px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

    /* flip */
    .perspective { perspective: 1200px; }
    .card-inner { transform-style: preserve-3d; transition: transform 0.42s cubic-bezier(0.4,0,0.2,1); position: relative; width: 100%; height: 100%; cursor: pointer; }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 28px; }
    .face-front { background: #fff; border: 1px solid #e0dfd8; }
    .face-back  { background: #1a1a1a; border: 1px solid #222; transform: rotateY(180deg); }
    .face-label { font-size: 10px; letter-spacing: 0.1em; position: absolute; top: 16px; left: 20px; }
    .face-front .face-label { color: #ccc; }
    .face-back  .face-label { color: #444; }
    .face-text { font-size: 28px; font-weight: 600; text-align: center; line-height: 1.4; word-break: break-word; }
    .face-front .face-text { color: #1a1a1a; }
    .face-back  .face-text { color: #fff; margin-bottom: 80px; }
    .face-hint { position: absolute; bottom: 16px; font-size: 11px; color: #ccc; animation: pu 2.5s ease-in-out infinite; }
    @keyframes pu { 0%,100%{opacity:.35} 50%{opacity:.85} }

    /* review badge on front */
    .review-badge { position: absolute; top: 14px; right: 16px; font-size: 11px; border-radius: 6px; padding: 2px 8px; font-weight: 500; }
    .badge-due    { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; }
    .badge-soon   { background: #fffbeb; border: 1px solid #fcd34d; color: #d97706; }
    .badge-later  { background: #f0fdf4; border: 1px solid #86efac; color: #16a34a; }
    .badge-new    { background: #f5f3ff; border: 1px solid #c4b5fd; color: #7c3aed; }

    /* answer buttons — 3 levels */
    .answer-btns { position: absolute; bottom: 16px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; padding: 0 20px; }
    .ans-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 9px 6px; border-radius: 10px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid; font-family: inherit; transition: background 0.12s; line-height: 1.3; }
    .ans-sub { font-size: 10px; opacity: 0.7; font-weight: 400; }
    .ans-again { background: rgba(220,38,38,0.12); border-color: rgba(220,38,38,0.25); color: #ef4444; }
    .ans-again:hover { background: rgba(220,38,38,0.2); }
    .ans-hard  { background: rgba(217,119,6,0.12); border-color: rgba(217,119,6,0.25); color: #d97706; }
    .ans-hard:hover  { background: rgba(217,119,6,0.2); }
    .ans-good  { background: #fff; border-color: #ddd; color: #1a1a1a; }
    .ans-good:hover  { background: #f0f0f0; }
    .ans-easy  { background: rgba(22,163,74,0.12); border-color: rgba(22,163,74,0.25); color: #16a34a; }
    .ans-easy:hover  { background: rgba(22,163,74,0.2); }

    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .card-fadein { animation: fadeIn 0.18s ease-out; }

    /* nav */
    .nav { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .nav-btn { width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid #e0dfd8; background: #fff; color: #555; transition: all 0.15s; font-family: inherit; }
    .nav-btn:hover:not(:disabled) { background: #f7f7f3; border-color: #bbb; color: #1a1a1a; }
    .nav-btn:active:not(:disabled) { transform: scale(0.95); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-primary { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
    .nav-primary:hover:not(:disabled) { background: #2d2d2d; }
    .nav-counter { font-size: 12px; color: #999; min-width: 56px; text-align: center; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .tbtn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid; transition: all 0.15s; font-family: inherit; }
    .t-ghost   { background: transparent; border-color: transparent; color: #999; }
    .t-ghost:hover { color: #555; background: #eceae3; border-color: #eceae3; }
    .t-outline { background: #fff; border-color: #e0dfd8; color: #555; }
    .t-outline:hover { border-color: #bbb; color: #1a1a1a; }
    .t-active  { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
    .t-red     { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }

    .upload-zone { border: 1.5px dashed #d5d3cc; border-radius: 12px; background: #fafaf7; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.18s; display: block; }
    .upload-zone:hover { background: #f3f3ee; border-color: #999; }
    .upload-icon { width: 44px; height: 44px; border-radius: 10px; background: #f3f3ee; border: 1px solid #e0dfd8; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; color: #888; }
    .upload-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .upload-sub { font-size: 12px; color: #999; line-height: 1.7; }
    .done-icon { width: 50px; height: 50px; border-radius: 50%; background: #f3f3ee; border: 1px solid #e0dfd8; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; color: #666; }
    .error-box { border-left: 3px solid #e04040; background: #fff5f5; border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 13px; color: #c03030; margin-bottom: 14px; }
    .all-done-session { text-align: center; padding: 48px 32px; }
    .all-done-session h2 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .all-done-session p  { font-size: 13px; color: #999; margin-bottom: 6px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ── SVG icons ──────────────────────────────────────────────────────────
const Svg = ({ children, size=15 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>{children}</svg>
);
const CheckIco   = ({s=15}) => <Svg size={s}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Svg>;
const LeftIco    = ({s=15}) => <Svg size={s}><path d="m15 18-6-6 6-6"/></Svg>;
const RightIco   = ({s=15}) => <Svg size={s}><path d="m9 18 6-6-6-6"/></Svg>;
const ShuffleIco = ({s=15}) => <Svg size={s}><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.8.8 3.6 2.1"/><path d="m22 18-4 4v-8z"/></Svg>;
const UploadIco  = ({s=15}) => <Svg size={s}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></Svg>;
const SaveIco    = ({s=15}) => <Svg size={s}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Svg>;
const ResetIco   = ({s=15}) => <Svg size={s}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Svg>;
const DlIco      = ({s=15}) => <Svg size={s}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></Svg>;
const FileIco    = ({s=15}) => <Svg size={s}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></Svg>;
const CalIco     = ({s=15}) => <Svg size={s}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Svg>;

const sto = {
  get: (k,d) => { try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;} },
  set: (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} },
  del: (k)   => { try{localStorage.removeItem(k);}catch{} },
};

// ── SM-2 spaced repetition ─────────────────────────────────────────────
// rating: 0=また覚えてない 1=難しい 2=普通 3=簡単
// returns updated SRS fields
function sm2(card, rating) {
  const today = todayStr();
  let { interval=0, easeFactor=2.5, repetitions=0 } = card;

  if (rating === 0) {
    // 完全忘却: リセット、翌日
    repetitions = 0;
    interval = 1;
    easeFactor = Math.max(1.3, easeFactor - 0.2);
  } else if (rating === 1) {
    // 難しい: interval短め
    repetitions = Math.max(0, repetitions - 1);
    interval = Math.max(1, Math.round(interval * 1.2));
    easeFactor = Math.max(1.3, easeFactor - 0.15);
  } else {
    // 普通(2)・簡単(3)
    if (repetitions === 0) interval = 1;
    else if (repetitions === 1) interval = 3;
    else interval = Math.round(interval * easeFactor);
    repetitions += 1;
    if (rating === 3) {
      easeFactor = Math.min(3.0, easeFactor + 0.1);
      interval = Math.round(interval * 1.3);
    }
  }

  // nextReview = today + interval days
  const next = new Date();
  next.setDate(next.getDate() + interval);
  const nextReview = next.toISOString().slice(0,10);

  return { interval, easeFactor, repetitions, lastReview: today, nextReview, learned: rating >= 2 };
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date(todayStr());
  return Math.round(diff / 86400000);
}

function reviewLabel(card) {
  if (!card.nextReview) return { text: '新規', cls: 'badge-new' };
  const d = daysUntil(card.nextReview);
  if (d <= 0) return { text: '今日', cls: 'badge-due' };
  if (d === 1) return { text: '明日', cls: 'badge-soon' };
  return { text: `${d}日後`, cls: 'badge-later' };
}

// Preview next interval for each button
function previewInterval(card, rating) {
  const r = sm2(card, rating);
  const d = daysUntil(r.nextReview);
  if (d <= 0) return '今日';
  if (d === 1) return '明日';
  return `${d}日後`;
}

// ── CSV helpers ───────────────────────────────────────────────────────
function parseCSV(text) {
  const lines=text.split('\n'), result=[];
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim(); if(!line) continue;
    const vals=[]; let cur='', inQ=false;
    for(const ch of line){ if(ch==='"')inQ=!inQ; else if(ch===','&&!inQ){vals.push(cur);cur='';}else cur+=ch; }
    vals.push(cur);
    if(vals.length>=2){
      const front=vals[0].replace(/^"|"$/g,'').trim();
      const back =vals[1].replace(/^"|"$/g,'').trim();
      // col3: learned legacy, col4: interval, col5: easeFactor, col6: repetitions, col7: nextReview
      let learned=false, interval=0, easeFactor=2.5, repetitions=0, nextReview=null, lastReview=null;
      if(vals[2]){const st=vals[2].replace(/^"|"$/g,'').trim().toLowerCase();learned=st==='1'||st==='true'||st==='済';}
      if(vals[3]){interval=parseFloat(vals[3])||0;}
      if(vals[4]){easeFactor=parseFloat(vals[4])||2.5;}
      if(vals[5]){repetitions=parseInt(vals[5])||0;}
      if(vals[6]){nextReview=vals[6].replace(/^"|"$/g,'').trim()||null;}
      if(vals[7]){lastReview=vals[7].replace(/^"|"$/g,'').trim()||null;}
      if(front&&back) result.push({front,back,learned,interval,easeFactor,repetitions,nextReview,lastReview,id:i});
    }
  }
  if(result.length&&(result[0].front.includes('表面')||result[0].front==='front'||result[0].front==='問題')) result.shift();
  return result;
}

function toCSV(cards) {
  const esc=s=>(s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s.replace(/"/g,'""')}"`:s;
  let csv="表面,裏面,状態,interval,easeFactor,repetitions,nextReview,lastReview\n";
  cards.forEach(c=>{
    csv+=`${esc(c.front)},${esc(c.back)},${c.learned?1:0},${c.interval||0},${(c.easeFactor||2.5).toFixed(2)},${c.repetitions||0},${c.nextReview||''},${c.lastReview||''}\n`;
  });
  return csv;
}

// ── App ───────────────────────────────────────────────────────────────
function App() {
  const [cards,    setCards]    = useState(() => sto.get('fc6_cards',[]));
  const [idx,      setIdx]      = useState(() => sto.get('fc6_idx',0));
  const [flipped,  setFlipped]  = useState(false);
  const [fname,    setFname]    = useState(() => sto.get('fc6_fname',''));
  const [mode,     setMode]     = useState('all'); // 'all' | 'due' | 'new'
  const [error,    setError]    = useState('');
  const [animKey,  setAnimKey]  = useState(0);
  const fileRef = useRef(null);

  useEffect(()=>{ sto.set('fc6_cards',cards);  },[cards]);
  useEffect(()=>{ sto.set('fc6_idx',idx);      },[idx]);
  useEffect(()=>{ sto.set('fc6_fname',fname);  },[fname]);

  const today = todayStr();

  // filter modes
  const dueCards  = cards.filter(c => !c.nextReview || c.nextReview <= today);
  const newCards  = cards.filter(c => !c.nextReview);

  const displayed = mode === 'due' ? dueCards
                  : mode === 'new' ? newCards
                  : cards;

  const curId   = cards[idx]?.id;
  const dispIdx = displayed.findIndex(c=>c.id===curId);
  const safe    = dispIdx >= 0 ? dispIdx : 0;
  const cur     = cards[idx];

  // navigate
  const goTo = useCallback((nd) => {
    if (nd < 0 || nd >= displayed.length) return;
    setFlipped(false);
    const ti = cards.findIndex(c=>c.id===displayed[nd].id);
    setTimeout(()=>{ setIdx(ti); setAnimKey(k=>k+1); }, 130);
  }, [displayed, cards]);

  // answer with rating 0-3
  const answer = (rating) => {
    if (!cur) return;
    const srs = sm2(cur, rating);
    const updated = cards.map((c,i) => i===idx ? {...c, ...srs} : c);
    setCards(updated);

    // find next in current display (after update, due/new lists may shrink)
    const nextDisp = (() => {
      const newDisplayed = mode === 'due' ? updated.filter(c=>!c.nextReview||c.nextReview<=today)
                         : mode === 'new' ? updated.filter(c=>!c.nextReview)
                         : updated;
      // try next index, else first that's not the current card
      const afterUpdate = newDisplayed.filter(c=>c.id !== cur.id);
      // find one after current position
      const laterIdx = newDisplayed.findIndex((c,i) => i > safe && c.id !== cur.id);
      if (laterIdx >= 0) return newDisplayed[laterIdx];
      if (afterUpdate.length > 0) return afterUpdate[0];
      return null;
    })();

    setFlipped(false);
    if (nextDisp) {
      const ti = updated.findIndex(c=>c.id===nextDisp.id);
      setTimeout(()=>{ setIdx(ti); setAnimKey(k=>k+1); }, 130);
    } else {
      setTimeout(()=>{ setAnimKey(k=>k+1); }, 130);
    }
  };

  const shuffle = () => {
    setFlipped(false);
    setTimeout(()=>{
      const s=[...cards];
      for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}
      setCards(s); setIdx(0); setAnimKey(k=>k+1);
    }, 130);
  };

  const handleFile = (e) => {
    const file=e.target.files[0]; if(!file) return;
    if(!file.name.endsWith('.csv')){setError('CSVファイル（.csv）を選択してください。');return;}
    setError(''); setFname(file.name);
    const reader=new FileReader();
    reader.onload=ev=>{
      const parsed=parseCSV(ev.target.result);
      if(parsed.length){setCards(parsed);setIdx(0);setFlipped(false);setMode('all');setAnimKey(k=>k+1);}
      else{setError('有効なデータが見つかりませんでした。');setFname('');if(fileRef.current)fileRef.current.value='';}
    };
    reader.onerror=()=>setError('ファイル読み込みエラー。');
    reader.readAsText(file);
  };

  const dlCSV=(content,name)=>{
    const blob=new Blob([new Uint8Array([0xEF,0xBB,0xBF]),content],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  };
  const downloadSample=()=>dlCSV("表面,裏面\nApple,りんご\nDog,犬\nCat,猫\nWater,水\nBook,本",'sample_flashcards.csv');
  const saveProgress=()=>{ if(!cards.length)return; dlCSV(toCSV(cards),`${(fname||'flashcards').replace('.csv','').replace('_progress','')}_progress.csv`); };
  const reset=()=>{
    setCards([]);setFname('');setIdx(0);setFlipped(false);setError('');setMode('all');
    ['fc6_cards','fc6_idx','fc6_fname'].forEach(k=>sto.del(k));
    if(fileRef.current)fileRef.current.value='';
  };

  // stats
  const masteredCount = cards.filter(c=>c.repetitions>=3&&c.learned).length;
  const reviewedToday = cards.filter(c=>c.lastReview===today).length;

  const sessionDone = displayed.length > 0 && (() => {
    // all cards in current display have been reviewed today or have future review date
    if (mode === 'due') return dueCards.length === 0;
    if (mode === 'new') return newCards.length === 0;
    return false;
  })();

  const rl = cur ? reviewLabel(cur) : null;

  return (
    <div className="wrap">
      <div className="header">
        <div className="header-icon"><FileIco s={16}/></div>
        <div>
          <h1>フラッシュカード</h1>
          {fname&&<div className="fname">{fname}</div>}
        </div>
      </div>

      {error&&<div className="error-box">⚠ {error}</div>}

      {cards.length===0 ? (
        <div className="card">
          <label className="upload-zone">
            <div className="upload-icon"><UploadIco s={20}/></div>
            <div className="upload-title">CSVファイルを選択</div>
            <div className="upload-sub">1列目：問題　2列目：答え<br/>進捗付きCSVも読み込めます</div>
            <input type="file" accept=".csv" onChange={handleFile} ref={fileRef} style={{display:'none'}}/>
          </label>
          <div style={{textAlign:'center',marginTop:16,paddingTop:16,borderTop:'1px solid #eceae3'}}>
            <button onClick={downloadSample} className="tbtn t-ghost" style={{margin:'0 auto'}}>
              <DlIco s={13}/> サンプルCSVをダウンロード
            </button>
          </div>
        </div>
      ) : (
        <>
          {/* toolbar */}
          <div className="toolbar">
            <button onClick={reset} className="tbtn t-ghost"><ResetIco s={13}/> 終了</button>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              <button onClick={()=>{setMode('all');setFlipped(false);goTo(0);}} className={`tbtn ${mode==='all'?'t-active':'t-outline'}`}>すべて</button>
              <button onClick={()=>{setMode('due');setFlipped(false);}} className={`tbtn ${mode==='due'?'t-red':'t-outline'}`}>
                <CalIco s={12}/> 今日の復習 {dueCards.length>0&&<span style={{marginLeft:2,fontWeight:700}}>({dueCards.length})</span>}
              </button>
              <button onClick={()=>{setMode('new');setFlipped(false);}} className={`tbtn ${mode==='new'?'t-active':'t-outline'}`}>
                新規 {newCards.length>0&&<span style={{marginLeft:2}}>({newCards.length})</span>}
              </button>
              <button onClick={saveProgress} className="tbtn t-outline"><SaveIco s={13}/> 保存</button>
            </div>
          </div>

          {/* stats */}
          <div className="stats-row">
            <div className="stat-box">
              <div className={`stat-num ${dueCards.length>0?'red':''}`}>{dueCards.length}</div>
              <div className="stat-label">今日の復習</div>
            </div>
            <div className="stat-box">
              <div className="stat-num amber">{newCards.length}</div>
              <div className="stat-label">未学習</div>
            </div>
            <div className="stat-box">
              <div className="stat-num">{reviewedToday}</div>
              <div className="stat-label">今日学習済</div>
            </div>
            <div className="stat-box">
              <div className="stat-num green">{masteredCount}</div>
              <div className="stat-label">習得済み</div>
            </div>
          </div>

          {/* session done state */}
          {sessionDone ? (
            <div className="card all-done-session">
              <div className="done-icon" style={{marginBottom:14}}><CheckIco s={24}/></div>
              <h2>
                {mode==='due' ? '今日の復習が終わりました！' : '新規カードがありません'}
              </h2>
              <p>次の復習カードは明日以降に表示されます</p>
              <p style={{fontSize:12,color:'#bbb',marginBottom:20}}>今日学習済み: {reviewedToday}枚</p>
              <button onClick={()=>setMode('all')} className="tbtn t-outline" style={{margin:'0 auto'}}>
                全カードを見る
              </button>
            </div>
          ) : displayed.length === 0 ? (
            <div className="card all-done-session">
              <p style={{color:'#999'}}>このフィルターに該当するカードがありません</p>
            </div>
          ) : (
            <>
              <div style={{textAlign:'center',marginBottom:8}}>
                <span style={{fontSize:12,color:'#bbb'}}>{safe+1} / {displayed.length}</span>
              </div>

              <div className="perspective" style={{width:'100%',height:310,marginBottom:10}}
                onClick={()=>setFlipped(f=>!f)}>
                <div key={animKey} className={`card-inner card-fadein${flipped?' flipped':''}`}>

                  {/* Front */}
                  <div className="card-face face-front">
                    <span className="face-label">QUESTION</span>
                    {rl && <span className={`review-badge ${rl.cls}`}>{rl.text}</span>}
                    <div className="face-text" style={{fontSize:cur?.front?.length>18?20:28}}>{cur?.front}</div>
                    {cur?.interval > 0 && (
                      <div style={{position:'absolute',bottom:14,fontSize:11,color:'#ccc'}}>
                        前回の間隔: {cur.interval}日
                      </div>
                    )}
                    <span className="face-hint" style={{bottom: cur?.interval>0?30:16}}>タップして裏返す</span>
                  </div>

                  {/* Back */}
                  <div className="card-face face-back">
                    <span className="face-label">ANSWER</span>
                    <div className="face-text" style={{fontSize:cur?.back?.length>18?20:28}}>{cur?.back}</div>
                    <div className="answer-btns">
                      <button onClick={e=>{e.stopPropagation();answer(0);}} className="ans-btn ans-again">
                        <span>もう一度</span>
                        <span className="ans-sub">{cur?previewInterval(cur,0):''}</span>
                      </button>
                      <button onClick={e=>{e.stopPropagation();answer(1);}} className="ans-btn ans-hard">
                        <span>難しい</span>
                        <span className="ans-sub">{cur?previewInterval(cur,1):''}</span>
                      </button>
                      <button onClick={e=>{e.stopPropagation();answer(2);}} className="ans-btn ans-good">
                        <span>覚えた</span>
                        <span className="ans-sub">{cur?previewInterval(cur,2):''}</span>
                      </button>
                      <button onClick={e=>{e.stopPropagation();answer(3);}} className="ans-btn ans-easy">
                        <span>完璧</span>
                        <span className="ans-sub">{cur?previewInterval(cur,3):''}</span>
                      </button>
                    </div>
                  </div>

                </div>
              </div>

              <div className="nav">
                <button className="nav-btn" onClick={()=>goTo(safe-1)} disabled={safe===0}><LeftIco s={18}/></button>
                <span className="nav-counter">{safe+1} / {displayed.length}</span>
                <button className="nav-btn" onClick={shuffle} title="シャッフル" style={{width:38,height:38}}><ShuffleIco s={15}/></button>
                <button className="nav-btn nav-primary" onClick={()=>goTo(safe+1)} disabled={safe===displayed.length-1}><RightIco s={18}/></button>
              </div>
            </>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

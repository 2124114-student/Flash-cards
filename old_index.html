<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV フラッシュカード</title>
  
  <!-- Tailwind CSS (デザイン用) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (動作エンジン) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (ブラウザ上でReactコードを翻訳するツール) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 3D反転アニメーション用のCSS */
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- アイコンコンポーネント (Lucide IconsのSVG) ---
    const Upload = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>);
    const ChevronLeft = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>);
    const ChevronRight = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>);
    const Shuffle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.8.8 3.6 2.1l2 3.1"/><path d="m22 18-4-4v8z"/><path d="l-2-3.1c-.8-1.3-2.1-2.1-3.6-2.1H16"/></svg>);
    const RotateCcw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);
    const Download = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>);
    const FileText = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>);
    const AlertCircle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>);
    const CheckCircle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>);
    const Filter = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>);
    const Save = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>);

    // localStorage からデータを読み込むヘルパー関数
    const loadFromStorage = (key, defaultValue) => {
      try {
        const saved = localStorage.getItem(key);
        if (saved !== null) {
          return JSON.parse(saved);
        }
      } catch (e) {
        console.error("Storage error", e);
      }
      return defaultValue;
    };

    function App() {
      // アプリケーションの状態管理 (localStorageから初期値を読み込む)
      const [cards, setCards] = useState(() => loadFromStorage('csv_flashcards_data', []));
      const [currentIndex, setCurrentIndex] = useState(() => loadFromStorage('csv_flashcards_index', 0));
      const [isFlipped, setIsFlipped] = useState(false);
      const [fileName, setFileName] = useState(() => loadFromStorage('csv_flashcards_filename', ''));
      const [error, setError] = useState('');
      const [showOnlyUnlearned, setShowOnlyUnlearned] = useState(() => loadFromStorage('csv_flashcards_filter', false)); // 未習得のみ表示するフィルター
      const fileInputRef = useRef(null);

      // 状態が変わるたびに localStorage に保存する
      useEffect(() => {
        localStorage.setItem('csv_flashcards_data', JSON.stringify(cards));
      }, [cards]);

      useEffect(() => {
        localStorage.setItem('csv_flashcards_index', JSON.stringify(currentIndex));
      }, [currentIndex]);

      useEffect(() => {
        localStorage.setItem('csv_flashcards_filename', JSON.stringify(fileName));
      }, [fileName]);

      useEffect(() => {
        localStorage.setItem('csv_flashcards_filter', JSON.stringify(showOnlyUnlearned));
      }, [showOnlyUnlearned]);

      // 表示対象のカードをフィルタリング
      const displayCards = showOnlyUnlearned ? cards.filter(c => !c.learned) : cards;

      // 現在表示中のカードがフィルタリング結果の配列のどこにあるか（見つからない場合は0）
      const displayIndex = displayCards.findIndex(c => c.id === cards[currentIndex]?.id);
      const safeDisplayIndex = displayIndex >= 0 ? displayIndex : 0;

      // フィルター切り替え時にインデックスを調整
      useEffect(() => {
        if (showOnlyUnlearned && cards[currentIndex]?.learned) {
          const nextUnlearned = cards.find((c, i) => i > currentIndex && !c.learned) || cards.find(c => !c.learned);
          if (nextUnlearned) {
            setCurrentIndex(cards.findIndex(c => c.id === nextUnlearned.id));
          }
        }
      }, [showOnlyUnlearned, cards, currentIndex]);

      // サンプルCSVのダウンロード処理
      const downloadSample = () => {
        const csvContent = "表面（問題）,裏面（答え）,状態(0=未/1=済)\nApple,りんご,0\nDog,犬,1\nCat,猫,0\nWater,水,0\nBook,本,1\nSun,太陽,0";
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "sample_flashcards_progress.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // 進捗状況を含めたCSVのダウンロード（保存）処理
      const saveProgress = () => {
        if (cards.length === 0) return;

        let csvContent = "表面（問題）,裏面（答え）,状態(0=未/1=済)\n";
        
        cards.forEach(card => {
          const escapeCsv = (str) => {
            if (str.includes(',') || str.includes('"') || str.includes('\n')) {
              return `"${str.replace(/"/g, '""')}"`;
            }
            return str;
          };
          
          const front = escapeCsv(card.front);
          const back = escapeCsv(card.back);
          const status = card.learned ? "1" : "0";
          
          csvContent += `${front},${back},${status}\n`;
        });

        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        
        const baseName = fileName ? fileName.replace('.csv', '').replace('_progress', '') : 'my_flashcards';
        const saveName = `${baseName}_progress.csv`;
        link.setAttribute("download", saveName);
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // CSVファイルのアップロードとパース処理
      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!file.name.endsWith('.csv')) {
          setError('CSVファイル（.csv）を選択してください。');
          return;
        }

        setFileName(file.name);
        setError('');

        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          const lines = text.split('\n');
          const parsedCards = [];

          for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            const values = [];
            let currentValue = '';
            let inQuotes = false;
            
            for (let j = 0; j < line.length; j++) {
              const char = line[j];
              if (char === '"') {
                inQuotes = !inQuotes;
              } else if (char === ',' && !inQuotes) {
                values.push(currentValue);
                currentValue = '';
              } else {
                currentValue += char;
              }
            }
            values.push(currentValue);

            if (values.length >= 2) {
              const front = values[0].replace(/^"|"$/g, '').trim();
              const back = values[1].replace(/^"|"$/g, '').trim();
              
              let learned = false;
              if (values.length >= 3) {
                 const statusStr = values[2].replace(/^"|"$/g, '').trim().toLowerCase();
                 learned = statusStr === '1' || statusStr === 'true' || statusStr === '済';
              }

              if (front && back) {
                parsedCards.push({ front, back, learned, id: i });
              }
            }
          }

          if (parsedCards.length > 0) {
            if (parsedCards[0].front.includes('表面') || parsedCards[0].front === '問題' || parsedCards[0].front === 'front') {
              parsedCards.shift();
            }
            
            setCards(parsedCards);
            setCurrentIndex(0);
            setIsFlipped(false);
            setShowOnlyUnlearned(false);
          } else {
            setError('有効なデータが見つかりませんでした。1列目と2列目にデータがあるか確認してください。');
            setFileName('');
            if (fileInputRef.current) fileInputRef.current.value = '';
          }
        };
        reader.onerror = () => {
          setError('ファイルの読み込み中にエラーが発生しました。');
        };
        reader.readAsText(file);
      };

      // カード操作のハンドラー
      const nextCard = () => {
        if (displayCards.length === 0) return;
        if (safeDisplayIndex < displayCards.length - 1) {
          setIsFlipped(false);
          const nextCardInDisplay = displayCards[safeDisplayIndex + 1];
          const nextIndexInAll = cards.findIndex(c => c.id === nextCardInDisplay.id);
          setTimeout(() => setCurrentIndex(nextIndexInAll), 150);
        }
      };

      const prevCard = () => {
         if (displayCards.length === 0) return;
        if (safeDisplayIndex > 0) {
          setIsFlipped(false);
          const prevCardInDisplay = displayCards[safeDisplayIndex - 1];
          const prevIndexInAll = cards.findIndex(c => c.id === prevCardInDisplay.id);
          setTimeout(() => setCurrentIndex(prevIndexInAll), 150);
        }
      };

      // 学習状態の切り替え
      const toggleLearned = (e) => {
        e.stopPropagation();
        if (cards.length === 0 || !cards[currentIndex]) return;

        const newCards = [...cards];
        newCards[currentIndex].learned = !newCards[currentIndex].learned;
        setCards(newCards);

        if (showOnlyUnlearned && newCards[currentIndex].learned) {
            setTimeout(() => { setIsFlipped(false); }, 300);
        }
      };

      // シャッフル
      const shuffleCards = () => {
        setIsFlipped(false);
        setTimeout(() => {
          const shuffled = [...cards];
          for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
          }
          setCards(shuffled);
          setCurrentIndex(0);
        }, 150);
      };

      const resetApp = () => {
        setCards([]);
        setFileName('');
        setCurrentIndex(0);
        setIsFlipped(false);
        setError('');
        setShowOnlyUnlearned(false);
        if (fileInputRef.current) fileInputRef.current.value = '';

        // localStorageのデータもクリア
        localStorage.removeItem('csv_flashcards_data');
        localStorage.removeItem('csv_flashcards_index');
        localStorage.removeItem('csv_flashcards_filename');
        localStorage.removeItem('csv_flashcards_filter');
      };

      const learnedCount = cards.filter(c => c.learned).length;
      const progressPercentage = cards.length > 0 ? Math.round((learnedCount / cards.length) * 100) : 0;
      
      const isAllLearnedInFilter = showOnlyUnlearned && displayCards.length === 0 && cards.length > 0;

      return (
        <div className="min-h-screen flex flex-col items-center py-12 px-4">
          <header className="mb-8 text-center">
            <h1 className="text-3xl font-extrabold text-slate-900 mb-2 flex items-center justify-center gap-2">
              <FileText className="w-8 h-8 text-indigo-600" />
              CSV フラッシュカード
            </h1>
            <p className="text-slate-500">学習の進捗を保存して効率よく暗記</p>
          </header>

          {error && (
            <div className="w-full max-w-md bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded shadow-sm flex items-start gap-3">
              <AlertCircle className="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" />
              <p className="text-red-700 text-sm">{error}</p>
            </div>
          )}

          {cards.length === 0 ? (
            <div className="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
              <div className="text-center mb-6">
                <div className="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Upload className="w-10 h-10 text-indigo-500" />
                </div>
                <h2 className="text-xl font-bold text-slate-800 mb-2">ファイルを選択</h2>
                <p className="text-sm text-slate-500 mb-4 text-left">
                  1列目を「問題」、2列目を「答え」にしたCSVをアップロードしてください。過去に保存した進捗付きCSVも読み込めます。
                </p>
              </div>

              <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-indigo-200 border-dashed rounded-xl cursor-pointer bg-indigo-50/50 hover:bg-indigo-50 transition-colors mb-4">
                <div className="flex flex-col items-center justify-center pt-5 pb-6">
                  <p className="mb-2 text-sm text-indigo-600 font-semibold">クリックしてCSVを選択</p>
                  <p className="text-xs text-slate-500 mt-1">.csv 形式のみ対応</p>
                </div>
                <input 
                  type="file" 
                  className="hidden" 
                  accept=".csv" 
                  onChange={handleFileUpload}
                  ref={fileInputRef}
                />
              </label>

              <div className="border-t border-slate-100 pt-6 mt-2 text-center">
                <button 
                  onClick={downloadSample}
                  className="inline-flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-medium transition-colors"
                >
                  <Download className="w-4 h-4" />
                  進捗保存対応のサンプルをDL
                </button>
              </div>
            </div>
          ) : (
            <div className="w-full max-w-lg flex flex-col items-center">
              
              {/* ツールバー */}
              <div className="w-full flex flex-wrap items-center justify-between mb-4 gap-2">
                <button 
                  onClick={resetApp}
                  className="text-slate-400 hover:text-slate-600 flex items-center gap-1 text-sm font-medium transition-colors px-2 py-1"
                >
                  <RotateCcw className="w-4 h-4" />
                  終了
                </button>
                
                <div className="flex items-center gap-2">
                  <button
                    onClick={() => setShowOnlyUnlearned(!showOnlyUnlearned)}
                    className={`flex items-center gap-1.5 text-sm font-bold px-3 py-1.5 rounded-full border transition-colors ${
                      showOnlyUnlearned 
                        ? 'bg-amber-50 text-amber-600 border-amber-200' 
                        : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'
                    }`}
                  >
                    <Filter className="w-4 h-4" />
                    未学習のみ
                  </button>
                  
                  <button
                    onClick={saveProgress}
                    className="flex items-center gap-1.5 text-sm font-bold px-3 py-1.5 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-200 hover:bg-emerald-100 transition-colors shadow-sm"
                    title="現在の進捗をCSVに保存"
                  >
                    <Save className="w-4 h-4" />
                    進捗を保存
                  </button>
                </div>
              </div>

              {/* 進捗プログレスバー */}
              <div className="w-full bg-white p-4 rounded-xl shadow-sm border border-slate-100 mb-6">
                <div className="flex justify-between items-end mb-2">
                  <span className="text-sm font-bold text-slate-700">学習進捗</span>
                  <span className="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md">
                    {learnedCount} / {cards.length} 覚えた ({progressPercentage}%)
                  </span>
                </div>
                <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                  <div 
                    className="bg-emerald-500 h-2.5 rounded-full transition-all duration-500 ease-out" 
                    style={{ width: `${progressPercentage}%` }}
                  ></div>
                </div>
              </div>

              {isAllLearnedInFilter ? (
                 <div className="w-full h-80 sm:h-96 bg-white rounded-3xl shadow-lg border border-emerald-100 flex flex-col items-center justify-center p-8 text-center mb-8">
                    <div className="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mb-6">
                      <CheckCircle className="w-12 h-12 text-emerald-500" />
                    </div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-2">すべて覚えました！</h2>
                    <p className="text-slate-500 mb-6">現在、未学習のカードはありません。</p>
                    <button
                      onClick={() => setShowOnlyUnlearned(false)}
                      className="px-6 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl transition-colors shadow-md shadow-emerald-200"
                    >
                      すべてのカードを表示する
                    </button>
                 </div>
              ) : (
                <>
                  <div className="text-sm font-bold text-slate-500 mb-3 bg-white px-4 py-1.5 rounded-full shadow-sm border border-slate-100">
                    {safeDisplayIndex + 1} <span className="text-slate-300 font-normal">/</span> {displayCards.length}
                  </div>

                  <div 
                    className="relative w-full h-80 sm:h-96 cursor-pointer perspective-1000 group mb-6"
                    onClick={() => setIsFlipped(!isFlipped)}
                  >
                    <div className={`w-full h-full duration-500 transform-style-3d relative transition-transform ${isFlipped ? 'rotate-y-180' : ''}`}>
                      
                      <div className="absolute inset-0 backface-hidden bg-white rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 sm:p-12 text-center border border-slate-100">
                        <span className="absolute top-6 left-6 text-xs font-bold tracking-widest text-slate-300 uppercase">Question</span>
                        
                        {cards[currentIndex]?.learned && (
                           <div className="absolute top-6 right-6 flex items-center gap-1 text-emerald-500 bg-emerald-50 px-2 py-1 rounded-md text-xs font-bold">
                             <CheckCircle className="w-3.5 h-3.5" />
                             覚えた
                           </div>
                        )}

                        <h2 className="text-3xl sm:text-4xl font-bold text-slate-800 break-words w-full">
                          {cards[currentIndex]?.front}
                        </h2>
                        <p className="absolute bottom-6 text-slate-400 text-sm animate-pulse">タップして裏返す</p>
                      </div>

                      <div className="absolute inset-0 backface-hidden bg-indigo-600 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 sm:p-12 text-center border border-indigo-500 rotate-y-180">
                        <span className="absolute top-6 left-6 text-xs font-bold tracking-widest text-indigo-300 uppercase">Answer</span>
                        <h2 className="text-3xl sm:text-4xl font-bold text-white break-words w-full mb-8">
                          {cards[currentIndex]?.back}
                        </h2>

                        <div className="absolute bottom-6 w-full flex justify-center px-6">
                          <button
                            onClick={toggleLearned}
                            className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-sm transition-all transform hover:scale-105 active:scale-95 shadow-lg ${
                              cards[currentIndex]?.learned 
                                ? 'bg-emerald-500 text-white shadow-emerald-500/30' 
                                : 'bg-white text-indigo-600 shadow-black/10'
                            }`}
                          >
                            {cards[currentIndex]?.learned ? (
                               <>
                                 <CheckCircle className="w-5 h-5" />
                                 覚えた！（解除する）
                               </>
                            ) : (
                               <>
                                 <CheckCircle className="w-5 h-5 text-indigo-300" />
                                 このカードを「覚えた」にする
                               </>
                            )}
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="w-full flex items-center justify-center gap-4 sm:gap-6">
                    <button
                      onClick={prevCard}
                      disabled={safeDisplayIndex === 0}
                      className={`p-4 rounded-2xl flex items-center justify-center transition-all ${
                        safeDisplayIndex === 0 
                          ? 'bg-slate-100 text-slate-300 cursor-not-allowed' 
                          : 'bg-white text-slate-700 shadow-md hover:shadow-lg hover:text-indigo-600 active:scale-95'
                      }`}
                      aria-label="前のカード"
                    >
                      <ChevronLeft className="w-8 h-8" />
                    </button>

                    <button
                      onClick={shuffleCards}
                      className="p-4 rounded-2xl bg-white text-slate-700 shadow-md hover:shadow-lg hover:text-indigo-600 active:scale-95 transition-all flex flex-col items-center gap-1"
                      title="シャッフル"
                    >
                      <Shuffle className="w-6 h-6" />
                    </button>

                    <button
                      onClick={nextCard}
                      disabled={safeDisplayIndex === displayCards.length - 1}
                      className={`p-4 rounded-2xl flex items-center justify-center transition-all ${
                        safeDisplayIndex === displayCards.length - 1 
                          ? 'bg-slate-100 text-slate-300 cursor-not-allowed' 
                          : 'bg-indigo-600 text-white shadow-md shadow-indigo-200 hover:bg-indigo-700 hover:shadow-lg active:scale-95'
                      }`}
                      aria-label="次のカード"
                    >
                      <ChevronRight className="w-8 h-8" />
                    </button>
                  </div>
                </>
              )}
            </div>
          )}
        </div>
      );
    }

    // 画面に表示する処理
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
